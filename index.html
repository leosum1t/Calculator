<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-900 flex justify-center items-center min-h-screen">

    <div class="bg-black w-[360px] p-4 rounded-[36px] border border-zinc-700 shadow-2xl">
        <div id="display" class="text-right text-gray-200 text-6xl border-b-2 border-zinc-700 pb-6 mb-10 overflow-hidden whitespace-nowrap transition-all">0
        </div>
        <div class="grid grid-cols-4 gap-x-5 gap-y-8 text-center">

            <button id="clear" class="text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="AC">AC</button>
            <button id="delete" class="text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="DEL">⌫</button>
            <button class="btn text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="%">%</button>
            <button class="btn text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="/">÷</button>

            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="7">7</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="8">8</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="9">9</button>
            <button class="btn text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="*">×</button>

            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="4">4</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="5">5</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="6">6</button>
            <button class="btn text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="-">−</button>

            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="1">1</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="2">2</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="3">3</button>
            <button class="btn text-orange-500 text-3xl hover:text-orange-400 active:scale-90 transition cursor-pointer select-none" data-value="+">+</button>

            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="0">0</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value="00">00</button>
            <button class="btn text-white text-3xl hover:text-gray-300 active:scale-90 transition cursor-pointer select-none" data-value=".">.</button>
            <button id="equal" class="bg-orange-500 text-white w-16 h-16 rounded-full mx-auto text-3xl hover:bg-orange-400 active:scale-90 transition cursor-pointer select-none">=</button>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
